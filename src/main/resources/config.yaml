# Where the effective device/settings config comes from:
#   file     — this yaml is the source of truth (default; the config API is read-only)
#   database — devices + tuning live in SQLite, editable at runtime via the config API;
#              seeded from this file on first use. Bootstrap fields (database, clickhouse,
#              websocket, refreshThreads) always come from this file regardless.
configSource: file

ocpp:
  enabled: true
  heartbeatInterval: 300
  connectionTimeout: 60

database:
  path: ems.db

clickhouse:
  enabled: false

websocket:
  username: user
  password: password

grid:
  type: P1HomeWizard
  host: 192.168.129.17

devices:
  solar:
    - type: SMA_Sunny_Boy
      name: Sunny Boy 4
      host: 192.168.129.15
    - type: SMA_Sunny_Boy
      name: Sunny Boy 5
      host: 192.168.129.16
  heatPump:
    - type: DaikinHomeHub
      name: Daikin Altherma 3
      host: 192.168.129.12
  charger:
    - type: OCPP
      name: Garage
      chargePointId: CP01
      chargingCurrent:
        min: 6.0
        max: 32.0
  battery:
    - type: SMA_Sunny_Boy_Storage
      name: Home Battery
      host: 192.168.129.18
  car: []                 # e.g. - type: BMW / enabled: true / clientId: ... / vin: ...
  
