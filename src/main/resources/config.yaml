ocpp:
  enabled: true
  heartbeatInterval: 300
  connectionTimeout: 60

database:
  path: ems.db

cardata:
  enabled: false
  clientId: ""            # generated in the BMW CarData portal (CARDATA API)
  vin: ""                 # the vehicle to subscribe to
  socDescriptor: ""       # the SoC telemetry descriptor (confirm in the portal's descriptor list)
  # brokerHost / brokerPort default to BMW's customer streaming broker
  #   (customer.streaming-cardata.bmwgroup.com:9000). See docs/adding-bmw-cardata.md.

websocket:
  username: user
  password: password

grid:
  type: P1HomeWizard
  gridType: Phase3_230V
  host: 192.168.129.17

devices:
  solar:
    - type: SMA_Sunny_Boy
      name: Sunny Boy 4
      host: 192.168.129.15
    - type: SMA_Sunny_Boy
      name: Sunny Boy 5
      host: 192.168.129.16
  heatPump:
    - type: DaikinHomeHub
      name: Daikin Altherma 3
      host: 192.168.129.12
  charger:
    - type: WebastoUnite
      name: Webasto Unite
      host: 192.168.129.19
      chargingCurrent:
        min: 6.0
        max: 32.0
  battery:
    - type: SMA_Sunny_Boy_Storage
      name: Home Battery
      host: 192.168.129.18
  charger:
    - type: OCPP
      name: Garage
      chargePointId: CP01
      chargingCurrent:
        min: 6.0
        max: 32.0
  
